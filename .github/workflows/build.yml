name: Build GLP-1 Tracker

on:
  push:
    branches:
      - main

jobs:
  # ─── ANDROID BUILD ───────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  # ─── IOS BUILD ───────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install
          cd ..

      - name: Build iOS (no signing)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r GLP1-Tracker.ipa Payload/
          rm -rf Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: GLP1-Tracker.ipa
          retention-days: 7

  # ─── CREATE RELEASE ──────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: artifacts/android

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-release
          path: artifacts/ios

      - name: Get short commit SHA
        id: vars
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.vars.outputs.sha_short }}
          name: "GLP-1 Tracker — Build ${{ steps.vars.outputs.sha_short }}"
          body: |
            🤖 Automated build from commit ${{ github.sha }}

            **Changes:** ${{ github.event.head_commit.message }}

            ### Downloads
            - 📱 `app-release.apk` — Android (sideload or install directly)
            - 🍎 `GLP1-Tracker.ipa` — iOS (requires sideloading via AltStore or similar)

            > ⚠️ iOS IPA is unsigned — install via [AltStore](https://altstore.io) or [Sideloadly](https://sideloadly.io)
          files: |
            artifacts/android/app-release.apk
            artifacts/ios/GLP1-Tracker.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
